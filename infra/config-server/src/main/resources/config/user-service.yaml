spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ewm_main_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:54321}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
