spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/ewm_main_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:54321}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      continue-on-error: true
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

stats-service:
  id: stats-server
  retry:
    max-attempts: 3
    back-off-period: 3000

feign:
  circuitbreaker:
    enabled: true
