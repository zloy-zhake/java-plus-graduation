services:
  stats-server:
    build: ./stats/stats-server
    container_name: stat-server
    ports:
      - "9090:9090"
    depends_on:
      stat-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stat-db:5432/ewm_stats_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 54321

  stat-db:
    image: postgres:16.1
    container_name: stat-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ewm_stats_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 54321
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ewm_stats_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ewm-service:
    build: ./core/main-service
    container_name: main-service
    ports:
      - "8080:8080"
    depends_on:
      main-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://main-db:5432/ewm_main_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 54321
      STATS_SERVICE_URL: http://stat-server:9090

  main-db:
    image: postgres:16.1
    container_name: main-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ewm_main_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 54321
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ewm_main_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
