services:
  discovery-server:
    build: ./infra/discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 20

  config-server:
    build: ./infra/config-server
    container_name: config-server
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://discovery-server:8761/eureka/apps/CONFIG-SERVER" ]
      interval: 5s
      timeout: 5s
      retries: 20

  gateway-server:
    build: ./infra/gateway-server
    container_name: gateway-server
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

  stats-server:
    build: ./stats/stats-server
    container_name: stat-server
    depends_on:
      stat-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

  stat-db:
    image: postgres:16.1
    container_name: stat-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ewm_stats_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 54321
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ewm_stats_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build: ./core/user-service
    container_name: user-service
    depends_on:
      main-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

  ewm-service:
    build: ./core/main-service
    container_name: main-service
    depends_on:
      main-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

  main-db:
    image: postgres:16.1
    container_name: main-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ewm_main_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 54321
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ewm_main_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
