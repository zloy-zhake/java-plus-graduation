spring:
  application:
    name: request-service
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server
      fail-fast: false
      retry:
        max-attempts: 10
        initial-interval: 2000
        max-interval: 5000
        multiplier: 1.5

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
